  - { topic: /robot/digital_io/left_button_ok/state,         type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/left_button_show/state,       type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/left_hand_camera_power/state, type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/left_inner_light/state,       type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/left_lower_button/state,      type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/left_lower_cuff/state,        type: baxter_core_msgs/msg/DigitalIOState }
