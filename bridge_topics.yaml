# Baxter ROS1 - ROS2 bridge configuration
#
# Loaded onto the ROS1 parameter server with:  rosparam load /bridge_topics.yaml
# Read by parameter_bridge at startup from params:  topics / services_1_to_2
#
# topics          — bidirectional; data flows where it is published
#   type          — ROS 2 message type (bridge auto-maps to ROS 1 via mapping_rules.yaml)
#
# services_1_to_2 — ROS 1 services callable from ROS 2
#   type          — pkg/SrvName  (ROS 1 style, no "srv/" prefix)

topics:

  # ── Robot top-level state ───────────────────────────────────────────────────
  - { topic: /robot/state,                type: baxter_core_msgs/msg/AssemblyState }
  - { topic: /robot/assembly/left/state,  type: baxter_core_msgs/msg/AssemblyState }
  - { topic: /robot/assembly/right/state, type: baxter_core_msgs/msg/AssemblyState }
  - { topic: /robot/assembly/head/state,  type: baxter_core_msgs/msg/AssemblyState }
  - { topic: /robot/assembly/torso/state, type: baxter_core_msgs/msg/AssemblyState }

  # ── Robot enable / stop / reset / homing ───────────────────────────────────
  - { topic: /robot/set_super_enable,      type: std_msgs/msg/Bool  }
  - { topic: /robot/set_super_reset,       type: std_msgs/msg/Empty }
  - { topic: /robot/set_super_stop,        type: std_msgs/msg/Empty }
  - { topic: /robot/set_homing_mode,       type: std_msgs/msg/Bool  }
  - { topic: /robot/set_motor_voltage_low, type: std_msgs/msg/Bool  }

  # ── Joints ─────────────────────────────────────────────────────────────────
  - { topic: /robot/joint_states,          type: sensor_msgs/msg/JointState }
  - { topic: /robot/ref_joint_states,      type: sensor_msgs/msg/JointState }
  - { topic: /robot/joint_state_publish_rate, type: std_msgs/msg/Float64    }

  # ── Accelerometers ─────────────────────────────────────────────────────────
  - { topic: /robot/accelerometer/left_accelerometer/state,  type: sensor_msgs/msg/Imu }
  - { topic: /robot/accelerometer/right_accelerometer/state, type: sensor_msgs/msg/Imu }

  # ── Arm joint commands ─────────────────────────────────────────────────────
  - { topic: /robot/limb/left/joint_command,          type: baxter_core_msgs/msg/JointCommand }
  - { topic: /robot/limb/right/joint_command,         type: baxter_core_msgs/msg/JointCommand }
  - { topic: /robot/limb/left/joint_command_timeout,  type: std_msgs/msg/Float64 }
  - { topic: /robot/limb/right/joint_command_timeout, type: std_msgs/msg/Float64 }
  - { topic: /robot/limb/left/set_speed_ratio,        type: std_msgs/msg/Float64 }
  - { topic: /robot/limb/right/set_speed_ratio,       type: std_msgs/msg/Float64 }
  - { topic: /robot/limb/left/command_velocity_tozero,  type: std_msgs/msg/Empty }
  - { topic: /robot/limb/right/command_velocity_tozero, type: std_msgs/msg/Empty }
  - { topic: /robot/limb/left/command_twist_stamped,  type: geometry_msgs/msg/TwistStamped }
  - { topic: /robot/limb/right/command_twist_stamped, type: geometry_msgs/msg/TwistStamped }
  - { topic: /robot/limb/left/command_stiffness,      type: std_msgs/msg/UInt32 }
  - { topic: /robot/limb/right/command_stiffness,     type: std_msgs/msg/UInt32 }
  - { topic: /robot/limb/left/inverse_dynamics_command, type: trajectory_msgs/msg/JointTrajectoryPoint }
  - { topic: /robot/limb/right/inverse_dynamics_command,type: trajectory_msgs/msg/JointTrajectoryPoint }
  - { topic: /robot/limb/left/use_default_spring_model,  type: std_msgs/msg/Bool }
  - { topic: /robot/limb/right/use_default_spring_model, type: std_msgs/msg/Bool }
  - { topic: /robot/limb/left/set_dominance,  type: std_msgs/msg/Bool }
  - { topic: /robot/limb/right/set_dominance, type: std_msgs/msg/Bool }

  # ── Arm safety suppression (publish at ~10 Hz while active) ────────────────
  - { topic: /robot/limb/left/suppress_collision_avoidance,    type: std_msgs/msg/Empty }
  - { topic: /robot/limb/right/suppress_collision_avoidance,   type: std_msgs/msg/Empty }
  - { topic: /robot/limb/left/suppress_cuff_interaction,       type: std_msgs/msg/Empty }
  - { topic: /robot/limb/right/suppress_cuff_interaction,      type: std_msgs/msg/Empty }
  - { topic: /robot/limb/left/suppress_gravity_compensation,   type: std_msgs/msg/Empty }
  - { topic: /robot/limb/right/suppress_gravity_compensation,  type: std_msgs/msg/Empty }
  - { topic: /robot/limb/left/suppress_contact_safety,         type: std_msgs/msg/Empty }
  - { topic: /robot/limb/right/suppress_contact_safety,        type: std_msgs/msg/Empty }
  - { topic: /robot/limb/left/suppress_body_avoidance,         type: std_msgs/msg/Empty }
  - { topic: /robot/limb/right/suppress_body_avoidance,        type: std_msgs/msg/Empty }
  - { topic: /robot/limb/left/suppress_hand_overwrench_safety, type: std_msgs/msg/Empty }
  - { topic: /robot/limb/right/suppress_hand_overwrench_safety,type: std_msgs/msg/Empty }

  # ── Arm state ──────────────────────────────────────────────────────────────
  - { topic: /robot/limb/left/endpoint_state,            type: baxter_core_msgs/msg/EndpointState }
  - { topic: /robot/limb/right/endpoint_state,           type: baxter_core_msgs/msg/EndpointState }
  - { topic: /robot/limb/left/commanded_endpoint_state,  type: baxter_core_msgs/msg/EndpointState }
  - { topic: /robot/limb/right/commanded_endpoint_state, type: baxter_core_msgs/msg/EndpointState }
  - { topic: /robot/limb/left/gravity_compensation_torques,  type: baxter_core_msgs/msg/SEAJointState }
  - { topic: /robot/limb/right/gravity_compensation_torques, type: baxter_core_msgs/msg/SEAJointState }
  - { topic: /robot/limb/left/collision_avoidance_state,  type: baxter_core_msgs/msg/CollisionAvoidanceState  }
  - { topic: /robot/limb/right/collision_avoidance_state, type: baxter_core_msgs/msg/CollisionAvoidanceState  }
  - { topic: /robot/limb/left/collision_detection_state,  type: baxter_core_msgs/msg/CollisionDetectionState  }
  - { topic: /robot/limb/right/collision_detection_state, type: baxter_core_msgs/msg/CollisionDetectionState  }
  - { topic: /robot/limb/left/state,  type: baxter_core_msgs/msg/AssemblyState }
  - { topic: /robot/limb/right/state, type: baxter_core_msgs/msg/AssemblyState }

  # ── Head ───────────────────────────────────────────────────────────────────
  - { topic: /robot/head/command_head_pan, type: baxter_core_msgs/msg/HeadPanCommand }
  - { topic: /robot/head/command_head_nod, type: std_msgs/msg/Bool                   }
  - { topic: /robot/head/head_state,       type: baxter_core_msgs/msg/HeadState      }
  - { topic: /robot/head/state,            type: baxter_core_msgs/msg/AssemblyState  }

  # ── Display ────────────────────────────────────────────────────────────────
  - { topic: /robot/xdisplay, type: sensor_msgs/msg/Image }

  # ── End effectors ──────────────────────────────────────────────────────────
  - { topic: /robot/end_effector/left_gripper/command,              type: baxter_core_msgs/msg/EndEffectorCommand    }
  - { topic: /robot/end_effector/right_gripper/command,             type: baxter_core_msgs/msg/EndEffectorCommand    }
  - { topic: /robot/end_effector/left_gripper/rsdk/set_properties,  type: baxter_core_msgs/msg/EndEffectorProperties }
  - { topic: /robot/end_effector/right_gripper/rsdk/set_properties, type: baxter_core_msgs/msg/EndEffectorProperties }
  - { topic: /robot/end_effector/left_gripper/rsdk/set_state,       type: baxter_core_msgs/msg/EndEffectorState      }
  - { topic: /robot/end_effector/right_gripper/rsdk/set_state,      type: baxter_core_msgs/msg/EndEffectorState      }
  - { topic: /robot/end_effector/left_gripper/state,       type: baxter_core_msgs/msg/EndEffectorState      }
  - { topic: /robot/end_effector/right_gripper/state,      type: baxter_core_msgs/msg/EndEffectorState      }
  - { topic: /robot/end_effector/left_gripper/properties,  type: baxter_core_msgs/msg/EndEffectorProperties }
  - { topic: /robot/end_effector/right_gripper/properties, type: baxter_core_msgs/msg/EndEffectorProperties }

  # ── Navigators ─────────────────────────────────────────────────────────────
  - { topic: /robot/navigators/left_navigator/state,        type: baxter_core_msgs/msg/NavigatorState  }
  - { topic: /robot/navigators/right_navigator/state,       type: baxter_core_msgs/msg/NavigatorState  }
  - { topic: /robot/navigators/torso_left_navigator/state,  type: baxter_core_msgs/msg/NavigatorState  }
  - { topic: /robot/navigators/torso_right_navigator/state, type: baxter_core_msgs/msg/NavigatorState  }
  - { topic: /robot/navigators_states,                      type: baxter_core_msgs/msg/NavigatorStates }

  # ── IO aggregate states ────────────────────────────────────────────────────
  - { topic: /robot/digital_io_states, type: baxter_core_msgs/msg/DigitalIOStates }
  - { topic: /robot/analog_io_states,  type: baxter_core_msgs/msg/AnalogIOStates  }
