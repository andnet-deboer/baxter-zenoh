  - { topic: /robot/digital_io/left_pneumatic/state,         type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/left_shoulder_button/state,   type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/left_suck/state,              type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/left_upper_button/state,      type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/limit_switch_1/state,         type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/limit_switch_2/state,         type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/limit_switch_3/state,         type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/motor_fault_signal/state,     type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_blow/state,             type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_blue_light/state,       type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_button_back/state,      type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_button_ok/state,        type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_button_show/state,      type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_hand_camera_power/state,type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_inner_light/state,      type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_lower_button/state,     type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_lower_cuff/state,       type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_outer_light/state,      type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_pneumatic/state,        type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_shoulder_button/state,  type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_suck/state,             type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/right_upper_button/state,     type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_brake/state,            type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_brake_sensor/state,     type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_camera_power/state,     type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_digital_input0/state,   type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_foot_pedal/state,       type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_left_button_back/state, type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_left_button_ok/state,   type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_left_button_show/state, type: baxter_core_msgs/msg/DigitalIOState }
