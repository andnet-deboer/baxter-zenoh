  - { topic: /robot/digital_io/torso_left_outer_light/state, type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_process_sense0/state,   type: baxter_core_msgs/msg/DigitalIOState }
  - { topic: /robot/digital_io/torso_process_sense1/state,   type: baxter_core_msgs/msg/DigitalIOState }
