  - { topic: /robot/navigators/torso_right_navigator/state, ros2: baxter_core_msgs/msg/NavigatorState,  ros1: baxter_core_msgs/NavigatorState  }
  - { topic: /robot/navigators_states,                      ros2: baxter_core_msgs/msg/NavigatorStates, ros1: baxter_core_msgs/NavigatorStates }

  # IO aggregate states
  - { topic: /robot/digital_io_states, ros2: baxter_core_msgs/msg/DigitalIOStates, ros1: baxter_core_msgs/DigitalIOStates }
  - { topic: /robot/analog_io_states,  ros2: baxter_core_msgs/msg/AnalogIOStates,  ros1: baxter_core_msgs/AnalogIOStates  }

