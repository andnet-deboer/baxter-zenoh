# Baxter ROS1↔ROS2 bridge topic configuration
#
# ros2_to_ros1: command data       ROS 2 host → Baxter  ([ direction)
# ros1_to_ros2: sensor/state data  Baxter → ROS 2 host  (] direction)
#
# EXCLUDED (not bridgeable):
#   /ExternalTools/*/FKServer|IKServer/*  — ROS service request/reply wire topics, not pub/sub
#   /rosout /rosout_agg                   — type mismatch (rosgraph_msgs vs rcl_interfaces)
#   /tf2_web_republisher/*                — ROS action wire topics
#   /hdraw                                — internal Baxter UI rendering bus
#   /robot/collision_object               — requires moveit_msgs (not in bridge)
#   /robot/attached_collision_object      — same
#   /robustcontroller/*                   — internal calibration FSM; add manually if needed
#   *_names topics                        — std_msgs/String metadata, not useful to bridge
#
# ALSO EXCLUDED — use MotorControlMsgs (private Rethink Robotics package, not in bridge):
#   /robot/accelerometer_states, /robot/joint_limits
#   /robot/limb/*/limb_state, stiffness, stiffness_constraint, twist_speed_constraint,
#     velocity_controller_state, weight_integral_terms, command_joint_position,
#     command_nullspace_setpoint_and_twist_stamped, command_stiffness_limit,
#     command_twist_speed_limit, command_twist_speed_limit_scale,
#     set_damping_correction_weights, set_feed_forward_weights
#   /robot/end_effector/*/set_object_mass
#   /robot/homing_states
#   /collision/*/collision_detection, /collision/*/debug


# ── Commands: ROS 2 → ROS 1 ──────────────────────────────────────────────────

ros2_to_ros1:

  # Robot enable / stop / reset / homing
  - { topic: /robot/set_super_enable,      ros2: std_msgs/msg/Bool,  ros1: std_msgs/Bool  }
  - { topic: /robot/set_super_reset,       ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/set_super_stop,        ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/set_homing_mode,       ros2: std_msgs/msg/Bool,  ros1: std_msgs/Bool  }
  - { topic: /robot/set_motor_voltage_low, ros2: std_msgs/msg/Bool,  ros1: std_msgs/Bool  }

  # Joint commands
  - { topic: /robot/limb/left/joint_command,          ros2: baxter_core_msgs/msg/JointCommand, ros1: baxter_core_msgs/JointCommand }
  - { topic: /robot/limb/right/joint_command,         ros2: baxter_core_msgs/msg/JointCommand, ros1: baxter_core_msgs/JointCommand }
  - { topic: /robot/limb/left/joint_command_timeout,  ros2: std_msgs/msg/Float64,              ros1: std_msgs/Float64             }
  - { topic: /robot/limb/right/joint_command_timeout, ros2: std_msgs/msg/Float64,              ros1: std_msgs/Float64             }
  - { topic: /robot/limb/left/set_speed_ratio,        ros2: std_msgs/msg/Float64,              ros1: std_msgs/Float64             }
  - { topic: /robot/limb/right/set_speed_ratio,       ros2: std_msgs/msg/Float64,              ros1: std_msgs/Float64             }
  - { topic: /robot/limb/left/command_velocity_tozero,  ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/right/command_velocity_tozero, ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/left/command_twist_stamped,  ros2: geometry_msgs/msg/TwistStamped, ros1: geometry_msgs/TwistStamped }
  - { topic: /robot/limb/right/command_twist_stamped, ros2: geometry_msgs/msg/TwistStamped, ros1: geometry_msgs/TwistStamped }
  - { topic: /robot/limb/left/use_default_spring_model,  ros2: std_msgs/msg/Bool, ros1: std_msgs/Bool }
  - { topic: /robot/limb/right/use_default_spring_model, ros2: std_msgs/msg/Bool, ros1: std_msgs/Bool }
  - { topic: /robot/joint_state_publish_rate, ros2: std_msgs/msg/Float64, ros1: std_msgs/Float64 }

  # Safety suppression (publish at ~10 Hz to keep suppressed)
  - { topic: /robot/limb/left/suppress_collision_avoidance,    ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/right/suppress_collision_avoidance,   ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/left/suppress_cuff_interaction,       ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/right/suppress_cuff_interaction,      ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/left/suppress_gravity_compensation,   ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/right/suppress_gravity_compensation,  ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/left/suppress_contact_safety,         ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/right/suppress_contact_safety,        ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/left/suppress_body_avoidance,         ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/right/suppress_body_avoidance,        ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/left/suppress_hand_overwrench_safety, ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }
  - { topic: /robot/limb/right/suppress_hand_overwrench_safety,ros2: std_msgs/msg/Empty, ros1: std_msgs/Empty }

  # Head
  - { topic: /robot/head/command_head_pan, ros2: baxter_core_msgs/msg/HeadPanCommand, ros1: baxter_core_msgs/HeadPanCommand }
  - { topic: /robot/head/command_head_nod, ros2: std_msgs/msg/Bool,                   ros1: std_msgs/Bool                   }

  # Display
  - { topic: /robot/xdisplay, ros2: sensor_msgs/msg/Image, ros1: sensor_msgs/Image }

  # End effectors
  - { topic: /robot/end_effector/left_gripper/command,              ros2: baxter_core_msgs/msg/EndEffectorCommand,    ros1: baxter_core_msgs/EndEffectorCommand    }
  - { topic: /robot/end_effector/right_gripper/command,             ros2: baxter_core_msgs/msg/EndEffectorCommand,    ros1: baxter_core_msgs/EndEffectorCommand    }
  - { topic: /robot/end_effector/left_gripper/configure,            ros2: baxter_core_msgs/msg/EndEffectorCommand,    ros1: baxter_core_msgs/EndEffectorCommand    }
  - { topic: /robot/end_effector/right_gripper/configure,           ros2: baxter_core_msgs/msg/EndEffectorCommand,    ros1: baxter_core_msgs/EndEffectorCommand    }
  - { topic: /robot/end_effector/left_gripper/rsdk/set_properties,  ros2: baxter_core_msgs/msg/EndEffectorProperties, ros1: baxter_core_msgs/EndEffectorProperties }
  - { topic: /robot/end_effector/right_gripper/rsdk/set_properties, ros2: baxter_core_msgs/msg/EndEffectorProperties, ros1: baxter_core_msgs/EndEffectorProperties }
  - { topic: /robot/end_effector/left_gripper/rsdk/set_state,       ros2: baxter_core_msgs/msg/EndEffectorState,      ros1: baxter_core_msgs/EndEffectorState      }
  - { topic: /robot/end_effector/right_gripper/rsdk/set_state,      ros2: baxter_core_msgs/msg/EndEffectorState,      ros1: baxter_core_msgs/EndEffectorState      }

  # IO commands
  - { topic: /robot/digital_io/command, ros2: baxter_core_msgs/msg/DigitalOutputCommand, ros1: baxter_core_msgs/DigitalOutputCommand }
  - { topic: /robot/analog_io/command,  ros2: baxter_core_msgs/msg/AnalogOutputCommand,  ros1: baxter_core_msgs/AnalogOutputCommand  }

  # Sonar enable and lights
  - { topic: /robot/sonar/head_sonar/set_sonars_enabled,      ros2: std_msgs/msg/Bool,   ros1: std_msgs/Bool   }
  - { topic: /robot/sonar/head_sonar/lights/set_lights,       ros2: std_msgs/msg/UInt16, ros1: std_msgs/UInt16 }
  - { topic: /robot/sonar/head_sonar/lights/set_green_level,  ros2: std_msgs/msg/Float32, ros1: std_msgs/Float32 }
  - { topic: /robot/sonar/head_sonar/lights/set_red_level,    ros2: std_msgs/msg/Float32, ros1: std_msgs/Float32 }

  # Additional arm commands
  - { topic: /robot/limb/left/command_stiffness,       ros2: std_msgs/msg/UInt32,                       ros1: std_msgs/UInt32                       }
  - { topic: /robot/limb/right/command_stiffness,      ros2: std_msgs/msg/UInt32,                       ros1: std_msgs/UInt32                       }
  - { topic: /robot/limb/left/inverse_dynamics_command, ros2: trajectory_msgs/msg/JointTrajectoryPoint, ros1: trajectory_msgs/JointTrajectoryPoint   }
  - { topic: /robot/limb/right/inverse_dynamics_command,ros2: trajectory_msgs/msg/JointTrajectoryPoint, ros1: trajectory_msgs/JointTrajectoryPoint   }
  - { topic: /robot/limb/left/set_dominance,           ros2: std_msgs/msg/Bool,                         ros1: std_msgs/Bool                         }
  - { topic: /robot/limb/right/set_dominance,          ros2: std_msgs/msg/Bool,                         ros1: std_msgs/Bool                         }


# ── Sensor / state data: ROS 1 → ROS 2 ──────────────────────────────────────

ros1_to_ros2:

  # Robot top-level state
  - { topic: /robot/state,                ros2: baxter_core_msgs/msg/AssemblyState, ros1: baxter_core_msgs/AssemblyState }
  - { topic: /robot/assembly/left/state,  ros2: baxter_core_msgs/msg/AssemblyState, ros1: baxter_core_msgs/AssemblyState }
  - { topic: /robot/assembly/right/state, ros2: baxter_core_msgs/msg/AssemblyState, ros1: baxter_core_msgs/AssemblyState }
  - { topic: /robot/assembly/head/state,  ros2: baxter_core_msgs/msg/AssemblyState, ros1: baxter_core_msgs/AssemblyState }
  - { topic: /robot/assembly/torso/state, ros2: baxter_core_msgs/msg/AssemblyState, ros1: baxter_core_msgs/AssemblyState }

  # Joints
  - { topic: /robot/joint_states,     ros2: sensor_msgs/msg/JointState, ros1: sensor_msgs/JointState }
  - { topic: /robot/ref_joint_states, ros2: sensor_msgs/msg/JointState, ros1: sensor_msgs/JointState }

  # Accelerometers
  - { topic: /robot/accelerometer/left_accelerometer/state,  ros2: sensor_msgs/msg/Imu, ros1: sensor_msgs/Imu }
  - { topic: /robot/accelerometer/right_accelerometer/state, ros2: sensor_msgs/msg/Imu, ros1: sensor_msgs/Imu }

  # Arm endpoint and torque
  - { topic: /robot/limb/left/endpoint_state,            ros2: baxter_core_msgs/msg/EndpointState,  ros1: baxter_core_msgs/EndpointState  }
  - { topic: /robot/limb/right/endpoint_state,           ros2: baxter_core_msgs/msg/EndpointState,  ros1: baxter_core_msgs/EndpointState  }
  - { topic: /robot/limb/left/commanded_endpoint_state,  ros2: baxter_core_msgs/msg/EndpointState,  ros1: baxter_core_msgs/EndpointState  }
  - { topic: /robot/limb/right/commanded_endpoint_state, ros2: baxter_core_msgs/msg/EndpointState,  ros1: baxter_core_msgs/EndpointState  }
  - { topic: /robot/limb/left/gravity_compensation_torques,  ros2: baxter_core_msgs/msg/SEAJointState, ros1: baxter_core_msgs/SEAJointState }
  - { topic: /robot/limb/right/gravity_compensation_torques, ros2: baxter_core_msgs/msg/SEAJointState, ros1: baxter_core_msgs/SEAJointState }

  # Arm safety state
  - { topic: /robot/limb/left/collision_avoidance_state,  ros2: baxter_core_msgs/msg/CollisionAvoidanceState,  ros1: baxter_core_msgs/CollisionAvoidanceState  }
  - { topic: /robot/limb/right/collision_avoidance_state, ros2: baxter_core_msgs/msg/CollisionAvoidanceState,  ros1: baxter_core_msgs/CollisionAvoidanceState  }
  - { topic: /robot/limb/left/collision_detection_state,  ros2: baxter_core_msgs/msg/CollisionDetectionState,  ros1: baxter_core_msgs/CollisionDetectionState  }
  - { topic: /robot/limb/right/collision_detection_state, ros2: baxter_core_msgs/msg/CollisionDetectionState,  ros1: baxter_core_msgs/CollisionDetectionState  }

  # Arm assembly state
  - { topic: /robot/limb/left/state,  ros2: baxter_core_msgs/msg/AssemblyState, ros1: baxter_core_msgs/AssemblyState }
  - { topic: /robot/limb/right/state, ros2: baxter_core_msgs/msg/AssemblyState, ros1: baxter_core_msgs/AssemblyState }

  # Head
  - { topic: /robot/head/head_state, ros2: baxter_core_msgs/msg/HeadState,    ros1: baxter_core_msgs/HeadState    }
  - { topic: /robot/head/state,      ros2: baxter_core_msgs/msg/AssemblyState, ros1: baxter_core_msgs/AssemblyState }

  # End effectors
  - { topic: /robot/end_effector/left_gripper/state,       ros2: baxter_core_msgs/msg/EndEffectorState,      ros1: baxter_core_msgs/EndEffectorState      }
  - { topic: /robot/end_effector/right_gripper/state,      ros2: baxter_core_msgs/msg/EndEffectorState,      ros1: baxter_core_msgs/EndEffectorState      }
  - { topic: /robot/end_effector/left_gripper/properties,  ros2: baxter_core_msgs/msg/EndEffectorProperties, ros1: baxter_core_msgs/EndEffectorProperties }
  - { topic: /robot/end_effector/right_gripper/properties, ros2: baxter_core_msgs/msg/EndEffectorProperties, ros1: baxter_core_msgs/EndEffectorProperties }

  # Navigators (buttons on arms and torso)
  - { topic: /robot/navigators/left_navigator/state,        ros2: baxter_core_msgs/msg/NavigatorState,  ros1: baxter_core_msgs/NavigatorState  }
  - { topic: /robot/navigators/right_navigator/state,       ros2: baxter_core_msgs/msg/NavigatorState,  ros1: baxter_core_msgs/NavigatorState  }
