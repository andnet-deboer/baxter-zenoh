  - { topic: /robustcontroller/right/CalibrateArm/status, type: baxter_maintenance_msgs/msg/CalibrateArmData   }
  - { topic: /robustcontroller/left/Tare/enable,          type: baxter_maintenance_msgs/msg/TareEnable }
  - { topic: /robustcontroller/right/Tare/enable,         type: baxter_maintenance_msgs/msg/TareEnable }
  - { topic: /robustcontroller/left/Tare/status,          type: baxter_maintenance_msgs/msg/TareData   }
  - { topic: /robustcontroller/right/Tare/status,         type: baxter_maintenance_msgs/msg/TareData   }
  - { topic: /robustcontroller/left/rc_plugins_loaded,    type: std_msgs/msg/Bool }
  - { topic: /robustcontroller/right/rc_plugins_loaded,   type: std_msgs/msg/Bool }


# ROS 1 services callable from ROS 2 clients
services_1_to_2:

  # IK solver (left and right arms)
  - { service: /ExternalTools/left/PositionKinematicsNode/IKServer,  type: baxter_core_msgs/SolvePositionIK }
  - { service: /ExternalTools/right/PositionKinematicsNode/IKServer, type: baxter_core_msgs/SolvePositionIK }

  # Camera management
  - { service: /cameras/list_cameras, type: baxter_core_msgs/ListCameras }
  - { service: /cameras/open_camera,  type: baxter_core_msgs/OpenCamera  }
  - { service: /cameras/close_camera, type: baxter_core_msgs/CloseCamera }