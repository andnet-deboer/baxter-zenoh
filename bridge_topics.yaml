  - { topic: /robot/analog_io/torso_left_wheel/value_uint32,      type: std_msgs/msg/UInt32               }
  - { topic: /robot/analog_io/torso_lighting/state,               type: baxter_core_msgs/msg/AnalogIOState }
  - { topic: /robot/analog_io/torso_lighting/value_uint32,        type: std_msgs/msg/UInt32               }
  - { topic: /robot/analog_io/torso_right_wheel/state,            type: baxter_core_msgs/msg/AnalogIOState }
  - { topic: /robot/analog_io/torso_right_wheel/value_uint32,     type: std_msgs/msg/UInt32               }

  # Range sensors 
  - { topic: /robot/range/left_hand_range/state,  type: sensor_msgs/msg/Range }
  - { topic: /robot/range/right_hand_range/state, type: sensor_msgs/msg/Range }

